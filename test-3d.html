<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Racing 3D — Test Entry</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1622;
      color: #e8eef5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #three-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #top-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: rgba(11, 22, 34, 0.75);
      border-bottom: 1px solid rgba(0, 176, 255, 0.35);
      font-size: 13px;
      letter-spacing: 0.5px;
      color: #7ed4ff;
      pointer-events: none;
    }
    #top-banner strong { color: #ffffff; }
    #debug-panel {
      position: absolute;
      top: 50px;
      right: 16px;
      min-width: 220px;
      padding: 12px 14px;
      background: rgba(11, 22, 34, 0.8);
      border: 1px solid rgba(0, 176, 255, 0.4);
      border-radius: 6px;
      font-size: 12px;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      line-height: 1.7;
      pointer-events: none;
    }
    #debug-panel h4 {
      margin: 0 0 8px 0;
      font-size: 11px;
      color: #7ed4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .debug-row { display: flex; justify-content: space-between; }
    .debug-row .k { color: #8aa4bd; }
    .debug-row .v { color: #ffffff; }
    #key-hints {
      position: absolute;
      left: 16px;
      bottom: 16px;
      padding: 10px 12px;
      background: rgba(11, 22, 34, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.7;
      color: #8aa4bd;
      pointer-events: none;
    }
    #key-hints .key {
      display: inline-block;
      min-width: 22px;
      padding: 1px 6px;
      margin-right: 4px;
      border-radius: 3px;
      background: #1a2a3a;
      color: #ffffff;
      text-align: center;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
    }
    #key-hints .pending { color: #5a6a7a; }
  </style>

  <!--
    Three.js loaded via import map (Epic 0).
    Browsers resolve `import * as THREE from 'three'` to this path.
  -->
  <script type="importmap">
    {
      "imports": {
        "three": "./node_modules/three/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="three-canvas"></canvas>

  <div id="top-banner">
    <strong>EPIC 0</strong> · smoke test (rotating cube) ·
    proves Three.js + importmap + ES modules + mock GameState all work
  </div>

  <div id="debug-panel">
    <h4>Debug</h4>
    <div class="debug-row"><span class="k">FPS</span><span class="v" id="dbg-fps">—</span></div>
    <div class="debug-row"><span class="k">Renderer</span><span class="v" id="dbg-renderer">—</span></div>
    <div class="debug-row"><span class="k">Three.js</span><span class="v" id="dbg-three-version">—</span></div>
    <div class="debug-row"><span class="k">Mock mastered</span><span class="v" id="dbg-mastered">—</span></div>
    <div class="debug-row"><span class="k">Mock fuelCoins</span><span class="v" id="dbg-coins">—</span></div>
    <div class="debug-row"><span class="k">Mock words</span><span class="v" id="dbg-words">—</span></div>
  </div>

  <div id="key-hints">
    <div><span class="key">R</span><span class="pending">reset car (Epic 3)</span></div>
    <div><span class="key">C</span><span class="pending">camera (Epic 1)</span></div>
    <div><span class="key">Tab</span><span class="pending">auto mode (Epic 4)</span></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { createMockGameState } from './3d/utils/test-fixtures.js';

    // ---------- Wire up mock GameState into the debug panel ----------
    const mock = createMockGameState();
    document.getElementById('dbg-mastered').textContent = mock.learning.totalWordsMastered;
    document.getElementById('dbg-coins').textContent = mock.fuelCoins;
    document.getElementById('dbg-words').textContent = mock.wordsFixture.length;
    document.getElementById('dbg-three-version').textContent = THREE.REVISION;

    // ---------- Three.js smoke test: rotating cube ----------
    // NOTE: Epic 0 only. Epic 1 (UC 1.3) will replace this with Scene3D.
    const canvas = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    renderer.setClearColor(0x0b1622, 1);
    document.getElementById('dbg-renderer').textContent =
      renderer.capabilities.isWebGL2 ? 'WebGL2' : 'WebGL1';

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 1.2, 4);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0x404060, 1.0));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(3, 5, 4);
    scene.add(dirLight);

    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 1.2, 1.2),
      new THREE.MeshStandardMaterial({ color: 0xe53935, roughness: 0.5, metalness: 0.1 })
    );
    scene.add(cube);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight, false);
    });

    // ---------- Render loop + FPS meter ----------
    const fpsEl = document.getElementById('dbg-fps');
    let last = performance.now();
    let frames = 0;
    let acc = 0;

    function tick(now) {
      const dt = (now - last) / 1000;
      last = now;

      cube.rotation.x += dt * 0.8;
      cube.rotation.y += dt * 1.1;

      renderer.render(scene, camera);

      frames += 1;
      acc += dt;
      if (acc >= 0.5) {
        fpsEl.textContent = Math.round(frames / acc);
        frames = 0;
        acc = 0;
      }

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  </script>
</body>
</html>
