<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Learning System Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #ffd700; }
    .section { background: #16213e; padding: 15px; margin: 15px 0; border-radius: 8px; }
    .section h2 { margin-top: 0; color: #4fc3f7; }
    button { padding: 8px 16px; margin: 5px; background: #4fc3f7; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #29b6f6; }
    pre { background: #0f0f23; padding: 10px; border-radius: 4px; overflow-x: auto; }
    .status { display: inline-block; padding: 2px 8px; border-radius: 4px; margin: 2px; }
    .mastered { background: #4caf50; }
    .learning { background: #ff9800; }
    .exposed { background: #9c27b0; }
  </style>
</head>
<body>
  <h1>🎓 Learning System Test</h1>

  <div class="section">
    <h2>1. Storage Status</h2>
    <button onclick="checkStorage()">Check Storage</button>
    <pre id="storage-output">Click button to check...</pre>
  </div>

  <div class="section">
    <h2>2. ProgressTracker Test</h2>
    <button onclick="testProgressTracker()">Run Tests</button>
    <button onclick="clearProgress()">Clear Progress</button>
    <pre id="progress-output">Click button to run tests...</pre>
  </div>

  <div class="section">
    <h2>3. DailyManager Test</h2>
    <button onclick="testDailyManager()">Run Tests</button>
    <button onclick="simulateDayChange()">Simulate Day Change</button>
    <pre id="daily-output">Click button to run tests...</pre>
  </div>

  <div class="section">
    <h2>4. Word Progress Summary</h2>
    <button onclick="showProgressSummary()">Show Summary</button>
    <div id="progress-summary"></div>
  </div>

  <script type="module">
    import { EventBus } from './core/event-bus.js';
    import { GameState } from './core/game-state.js';
    import { ProgressTracker } from './learning/progress-tracker.js';
    import { DailyManager } from './learning/daily-manager.js';
    import { MASTERY_STATUS } from './config/learning-config.js';

    // Global instances
    const eventBus = new EventBus();
    const gameState = new GameState(eventBus);
    const progressTracker = new ProgressTracker(eventBus);
    const dailyManager = new DailyManager(eventBus, gameState);

    window.MASTERY_STATUS = MASTERY_STATUS;

    window.checkStorage = function() {
      const output = document.getElementById('storage-output');
      const data = {
        version: localStorage.getItem('wr_storage_version'),
        gameState: JSON.parse(localStorage.getItem('wr_game_state') || '{}'),
        wordProgressKeys: Object.keys(JSON.parse(localStorage.getItem('wr_word_progress') || '{}').progress || {}),
        dailyStatsKeys: Object.keys(JSON.parse(localStorage.getItem('wr_daily_stats') || '{}')),
      };
      output.textContent = JSON.stringify(data, null, 2);
    };

    window.testProgressTracker = function() {
      const output = document.getElementById('progress-output');
      const results = [];

      // Test 1: Update status
      progressTracker.updateStatus('speed', 'PIT_BOARD', true, 1);
      let status = progressTracker.getStatus('speed');
      results.push(`Test 1 - Simple correct: ${status.status} (expected: simple_passed)`);

      // Test 2: Complete mastery
      progressTracker.updateStatus('speed', 'RADIO_MSG', true, 1);
      status = progressTracker.getStatus('speed');
      results.push(`Test 2 - Complex correct: ${status.status} (expected: mastered)`);

      // Test 3: Wrong answer on mastered
      progressTracker.updateStatus('speed', 'PIT_BOARD', false, 1);
      status = progressTracker.getStatus('speed');
      results.push(`Test 3 - Wrong on mastered: ${status.status} (expected: forgotten or exposed)`);

      // Test 4: Stats
      const stats = progressTracker.getStats();
      results.push(`Test 4 - Stats: total=${stats.total}, mastered=${stats.mastered}, learning=${stats.learning}`);

      // Test 5: Save
      progressTracker.save();
      const saved = JSON.parse(localStorage.getItem('wr_word_progress'));
      results.push(`Test 5 - Saved: ${saved ? 'OK' : 'FAILED'}`);

      output.textContent = results.join('\n');
    };

    window.clearProgress = function() {
      progressTracker.clear();
      document.getElementById('progress-output').textContent = 'Progress cleared!';
    };

    window.testDailyManager = function() {
      const output = document.getElementById('daily-output');
      const results = [];

      // Test 1: Today progress
      const progress = dailyManager.getTodayProgress();
      results.push(`Test 1 - Today: quizzes=${progress.quizzesCompleted}, questions=${progress.totalQuestions}`);

      // Test 2: Update progress
      dailyManager.updateProgress({ correct: true, fuelCoins: 5, gearCoins: 2, combo: 1 });
      dailyManager.updateProgress({ correct: true, fuelCoins: 5, gearCoins: 2, combo: 2 });
      dailyManager.updateProgress({ correct: false, combo: 0 });
      const updated = dailyManager.getTodayProgress();
      results.push(`Test 2 - After 3 answers: questions=${updated.totalQuestions}, correct=${updated.correctAnswers}`);

      // Test 3: Complete quiz
      dailyManager.completeQuiz({ totalQuestions: 10, correctCount: 8 });
      const afterQuiz = dailyManager.getTodayProgress();
      results.push(`Test 3 - After 1 quiz: quizzes=${afterQuiz.quizzesCompleted}`);

      // Test 4: Check goals
      const goals = dailyManager.checkDailyGoals();
      results.push(`Test 4 - Goals: allThree=${goals.allThree.achieved}, accuracy=${goals.accuracy80.progress}%`);

      // Test 5: Remaining
      results.push(`Test 5 - Remaining quizzes: ${dailyManager.getRemainingQuizzes()}`);

      // Test 6: Streak
      results.push(`Test 6 - Current streak: ${dailyManager.getStreak()}`);

      output.textContent = results.join('\n');
    };

    window.simulateDayChange = function() {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split('T')[0];
      gameState.set('daily.lastActiveDate', yesterdayStr);
      document.getElementById('daily-output').textContent = `Set lastActiveDate to ${yesterdayStr}\nRefresh page to trigger day change reset.`;
    };

    window.showProgressSummary = function() {
      const container = document.getElementById('progress-summary');
      const stats = progressTracker.getStats();
      const mastered = progressTracker.getMasteredWords();
      const wrong = progressTracker.getWrongWords();
      const check = progressTracker.getCheckWords();

      let html = `<p><strong>Stats:</strong> Total: ${stats.total}, Mastered: ${stats.mastered}, Learning: ${stats.learning}</p>`;

      if (mastered.length > 0) {
        html += '<p><strong>Mastered:</strong> ';
        html += mastered.map(w => `<span class="status mastered">${w.word}</span>`).join('');
        html += '</p>';
      }

      if (wrong.length > 0) {
        html += '<p><strong>Needs Review:</strong> ';
        html += wrong.map(w => `<span class="status learning">${w.word}</span>`).join('');
        html += '</p>';
      }

      if (check.needSimpleCheck.length > 0 || check.needComplexCheck.length > 0) {
        html += '<p><strong>Check Words:</strong> ';
        if (check.needSimpleCheck.length > 0) {
          html += check.needSimpleCheck.map(w => `<span class="status exposed">${w.word}(need simple)</span>`).join('');
        }
        if (check.needComplexCheck.length > 0) {
          html += check.needComplexCheck.map(w => `<span class="status exposed">${w.word}(need complex)</span>`).join('');
        }
        html += '</p>';
      }

      container.innerHTML = html;
    };
  </script>
</body>
</html>
