<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JS Syntax Check</title>
</head>
<body>
    <h2>JS Syntax Check Page</h2>
    <div id="result" style="color:green;font-size:16px;">Testing...</div>
    <script>
    // Global error capture
    window.addEventListener('error', function(e) {
        document.getElementById('result').style.color = 'red';
        document.getElementById('result').innerHTML =
            'ERROR: ' + e.message + '<br>File: ' + (e.filename||'') + '<br>Line: ' + (e.lineno||'');
    });

    // Try loading scripts one by one
    function loadScript(src, callback) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = callback;
        s.onerror = function() {
            document.getElementById('result').style.color = 'red';
            document.getElementById('result').innerHTML += '<br>Failed to load: ' + src;
        };
        document.head.appendChild(s);
    }

    // Load in order
    loadScript('js/quiz.js', function() {
        document.getElementById('result').innerHTML += '<br>quiz.js: OK';
        loadScript('js/track.js', function() {
            document.getElementById('result').innerHTML += '<br>track.js: OK';
            loadScript('js/car.js', function() {
                document.getElementById('result').innerHTML += '<br>car.js: OK';
                loadScript('js/game.js', function() {
                    document.getElementById('result').innerHTML += '<br>game.js: OK';
                    document.getElementById('result').innerHTML += '<br><br>All scripts loaded successfully!';
                });
            });
        });
    });
    </script>
</body>
</html>
