<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Racing - Back words, drive fast!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav id="top-nav">
        <button class="nav-btn active" data-page="home">首页</button>
        <button class="nav-btn" data-page="quiz">答题</button>
        <button class="nav-btn" data-page="shop">商店</button>
        <button class="nav-btn" data-page="race">比赛</button>
    </nav>

    <!-- Page 1: Home -->
    <div id="page-home" class="page active">
        <div class="home-content">
            <h1>WORD RACING</h1>
            <p>Back words, drive fast!</p>
            <div id="home-stats">
                <div class="stat-item">金币: <span id="home-coins">0</span></div>
                <div class="stat-item">燃油: <span id="home-fuel">100</span>/100</div>
                <div class="stat-item">Nitro: <span id="home-nitro">0</span></div>
                <div class="stat-item">燃油币: <span id="home-fuel-coins">0</span> 🪙</div>
                <div class="stat-item">装备币: <span id="home-gear-coins">0</span> ⚙️</div>
            </div>
            <div id="home-leaderboard">
                <!-- Leaderboard will be rendered here -->
            </div>
            <div id="home-lap-select" style="margin:20px 0;">
                <!-- Lap count selector -->
            </div>
            <button id="home-start-btn" style="padding:12px 24px;font-size:18px;cursor:pointer;">开始答题</button>
        </div>
    </div>

    <!-- Page 2: Quiz -->
    <div id="page-quiz" class="page">
        <div id="quiz-container">
            <!-- Quiz Type Selector -->
            <div id="quiz-type-selector">
                <button id="quiz-type-simple" class="quiz-type-btn active">简单题</button>
                <button id="quiz-type-complex" class="quiz-type-btn">复杂题</button>
            </div>

            <!-- Quiz Question -->
            <div id="quiz-question-area">
                <div id="quiz-progress"></div>
                <div id="quiz-word"></div>
                <div id="quiz-meaning-en"></div>
                <div id="quiz-sentence"></div>
                <div id="quiz-options"></div>
                <div id="quiz-nitro-hint">Correct answer = Nitro boost!</div>
            </div>

            <!-- Quiz Complete -->
            <div id="quiz-complete" style="display:none;">
                <h3>Pit Stop Complete!</h3>
                <div class="result-text" id="quiz-result-accuracy"></div>
                <div class="result-text" id="quiz-result-fuel"></div>
                <div class="result-text" id="quiz-result-gear"></div>
                <div class="result-text" id="quiz-result-wrong"></div>
                <div class="nitro-text" id="quiz-result-nitro"></div>
                <!-- Lap count selector -->
                <div id="quiz-lap-select" style="margin:12px 0;"></div>
                <button id="quiz-start-btn">START RACE</button>
                <button id="quiz-shop-btn" style="margin-left:12px;background:#444;">GO TO SHOP</button>
            </div>
        </div>
    </div>

    <!-- Page 3: Shop -->
    <div id="page-shop" class="page">
        <div id="shop-container">
            <h2>Pit Shop</h2>
            <div id="shop-stats">
                <div>燃油币: <span id="shop-fuel-coins">0</span> 🪙</div>
                <div>装备币: <span id="shop-gear-coins">0</span> ⚙️</div>
                <div>燃油: <span id="shop-fuel">100</span>/100</div>
                <div>Nitro: <span id="shop-nitro">0</span></div>
            </div>
            <div id="shop-items">
                <!-- Shop items will be rendered here -->
            </div>
            <div id="shop-actions" style="margin-top:20px;">
                <button id="shop-back-btn">返回首页</button>
                <button id="shop-race-btn" style="margin-left:12px;">开始比赛</button>
            </div>
        </div>
    </div>

    <!-- Page 4: Race -->
    <div id="page-race" class="page">
        <canvas id="gameCanvas"></canvas>
        <div id="touch-controls">
            <div class="touch-btn-group">
                <button class="touch-btn" data-action="left">&#9664;</button>
                <button class="touch-btn" data-action="down">&#9660;</button>
            </div>
            <div class="touch-btn-group">
                <button class="touch-btn" data-action="up">&#9650;</button>
                <button class="touch-btn" data-action="right">&#9654;</button>
                <button class="touch-btn touch-btn-nitro" data-action="nitro">N2O</button>
            </div>
        </div>
    </div>

    <!-- Scripts (order matters) -->
    <script src="js/quiz.js"></script>
    <script src="js/track.js"></script>
    <script src="js/car.js"></script>
    <script src="js/game.js"></script>
    <script src="js/nav.js"></script>
    <script>
    (function() {
        'use strict';

        window.addEventListener('error', function(e) {
            var msg = 'JS ERROR: ' + (e.message || 'unknown') + ' at ' + (e.filename || '') + ':' + (e.lineno || '');
            document.body.style.background = '#300';
            var d = document.createElement('div');
            d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c00;color:#fff;padding:12px;z-index:99999;font-size:14px;';
            d.textContent = msg;
            (document.body || document.documentElement).appendChild(d);
        });

        const canvas = document.getElementById('gameCanvas');
        const game = new Game(canvas);
        const nav = new NavManager(game);
        window.game = game;

        let isTouchDevice = false;

        game.init().then(() => {
            setupTouchDetection();
            nav.updateHomeStats();
        }).catch(err => {
            const d = document.createElement('div');
            d.style.cssText = 'color:#fff;background:#c00;padding:16px;font-size:14px;position:fixed;top:0;left:0;right:0;z-index:99999;';
            d.textContent = 'INIT ERROR: ' + err.message + ' | ' + (err.stack || '');
            document.body.appendChild(d);
        });

        function setupTouchDetection() {
            isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            if (isTouchDevice) {
                setupTouchControls();
            }
        }

        function setupTouchControls() {
            const touchControls = document.getElementById('touch-controls');
            const buttons = touchControls.querySelectorAll('.touch-btn');
            const inputState = { up: false, down: false, left: false, right: false, nitro: false };

            buttons.forEach(btn => {
                const action = btn.dataset.action;
                const start = (e) => {
                    e.preventDefault();
                    inputState[action] = true;
                    btn.classList.add('pressed');
                    game.setTouchInput(inputState);
                };
                const end = (e) => {
                    e.preventDefault();
                    inputState[action] = false;
                    btn.classList.remove('pressed');
                    game.setTouchInput(inputState);
                };

                btn.addEventListener('touchstart', start, { passive: false });
                btn.addEventListener('touchend', end, { passive: false });
                btn.addEventListener('touchcancel', end, { passive: false });
                btn.addEventListener('mousedown', start);
                btn.addEventListener('mouseup', end);
                btn.addEventListener('mouseleave', end);
            });

            touchControls.classList.add('active');
        }

        // Quiz functions
        window.startQuiz = function() {
            const questions = game.startNewQuiz();
            nav.switchPage('quiz');
            showQuizQuestion();
        };

        window.showQuizQuestion = function() {
            const q = game.quiz.getCurrentQuestion();
            if (!q) {
                finishQuiz();
                return;
            }

            const quizProgress = document.getElementById('quiz-progress');
            const quizWord = document.getElementById('quiz-word');
            const quizMeaningEn = document.getElementById('quiz-meaning-en');
            const quizSentence = document.getElementById('quiz-sentence');
            const quizOptions = document.getElementById('quiz-options');

            const current = Math.min(game.quiz.currentIndex, game.quiz.currentQuiz.length - 1);
            const total = game.quiz.currentQuiz.length;

            quizProgress.textContent = `Question ${current + 1} of ${total} | Correct: ${game.quiz.correctCount}`;
            quizWord.textContent = q.word;
            quizMeaningEn.textContent = q.meaningEn ? q.meaningEn : '';
            quizSentence.textContent = q.sentence ? `"${q.sentence}"` : '';

            quizOptions.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-option';
                btn.textContent = opt;
                btn.addEventListener('click', () => handleQuizAnswer(idx));
                quizOptions.appendChild(btn);
            });
        };

        window.handleQuizAnswer = function(idx) {
            const result = game.quiz.submitAnswer(idx);
            if (!result) return;

            const quizOptions = document.getElementById('quiz-options');
            const buttons = quizOptions.querySelectorAll('.quiz-option');
            buttons.forEach((btn, i) => {
                btn.classList.add('disabled');
                if (i === result.correctIndex) btn.classList.add('correct');
                if (i === idx && !result.correct) btn.classList.add('wrong');
            });

            setTimeout(() => {
                showQuizQuestion();
            }, 900);
        };

        window.finishQuiz = function() {
            const results = game.quiz.getResults();
            const quizQuestionArea = document.getElementById('quiz-question-area');
            const quizCompleteArea = document.getElementById('quiz-complete');

            game.onQuizComplete();

            quizQuestionArea.style.display = 'none';
            quizCompleteArea.style.display = 'block';

            const quizResultAccuracy = document.getElementById('quiz-result-accuracy');
            const quizResultFuel = document.getElementById('quiz-result-fuel');
            const quizResultGear = document.getElementById('quiz-result-gear');
            const quizResultWrong = document.getElementById('quiz-result-wrong');
            const quizResultNitro = document.getElementById('quiz-result-nitro');

            quizResultAccuracy.textContent = `Accuracy: ${results.accuracy}% (${results.correctCount}/${results.totalQuestions})`;
            quizResultFuel.textContent = `Fuel Coins: +${results.fuelCoinsEarned} 🪙`;
            quizResultGear.textContent = `Gear Coins: +${results.gearCoinsEarned} ⚙️`;

            if (results.wrong.length > 0) {
                quizResultWrong.textContent = 'Wrong: ' + results.wrong.map(w => w.word + '=' + w.meaning).join(', ');
            } else {
                quizResultWrong.textContent = 'Perfect! All correct!';
            }

            if (results.nitroCharges > 0) {
                quizResultNitro.textContent = `N2O Nitro x${results.nitroCharges} Ready!`;
            } else {
                quizResultNitro.textContent = 'No nitro this time. Try harder next race!';
            }

            renderLapSelector();
        };

        function renderLapSelector() {
            const quizLapSelect = document.getElementById('quiz-lap-select');
            quizLapSelect.innerHTML = '';
            const label = document.createElement('span');
            label.textContent = 'Laps: ';
            label.style.marginRight = '8px';
            quizLapSelect.appendChild(label);

            for (let i = 1; i <= 5; i++) {
                const btn = document.createElement('button');
                btn.textContent = i;
                btn.style.cssText = 'margin:0 3px;padding:4px 12px;border-radius:6px;cursor:pointer;font-weight:bold;';
                if (i === game.selectedLaps) {
                    btn.style.background = '#FFD700';
                    btn.style.color = '#1B5E20';
                } else {
                    btn.style.background = 'rgba(255,255,255,0.15)';
                    btn.style.color = '#FFF';
                }
                btn.addEventListener('click', () => {
                    game.setLapCount(i);
                    renderLapSelector();
                });
                quizLapSelect.appendChild(btn);
            }
        }

        // Quiz type selector
        const quizTypeSimpleBtn = document.getElementById('quiz-type-simple');
        const quizTypeComplexBtn = document.getElementById('quiz-type-complex');

        quizTypeSimpleBtn.addEventListener('click', () => {
            game.quiz.questionType = 'simple';
            quizTypeSimpleBtn.classList.add('active');
            quizTypeComplexBtn.classList.remove('active');
            game.quiz.generateQuiz(5, 3);
            showQuizQuestion();
        });

        quizTypeComplexBtn.addEventListener('click', () => {
            game.quiz.questionType = 'complex';
            quizTypeComplexBtn.classList.add('active');
            quizTypeSimpleBtn.classList.remove('active');
            game.quiz.generateQuiz(5, 3);
            showQuizQuestion();
        });

        // Quiz complete panel buttons
        const quizStartBtn = document.getElementById('quiz-start-btn');
        const quizShopBtn = document.getElementById('quiz-shop-btn');

        quizStartBtn.addEventListener('click', () => {
            game.continueToRace();
            nav.switchPage('race');
        });

        quizShopBtn.addEventListener('click', () => {
            nav.switchPage('shop');
        });

        // Home page button
        const homeStartBtn = document.getElementById('home-start-btn');
        homeStartBtn.addEventListener('click', () => {
            window.startQuiz();
        });

        // Shop page
        function renderShop() {
            const shopItems = document.getElementById('shop-items');
            shopItems.innerHTML = '';

            game._shopItems.forEach((item, i) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item';
                itemDiv.style.cssText = 'display:flex;justify-content:space-between;align-items:center;padding:15px;margin-bottom:10px;background:rgba(255,255,255,0.05);border-radius:8px;';

                const info = document.createElement('div');
                info.innerHTML = `<strong>${item.label}</strong> - ${item.desc} (${item.cost} ${item.currency === 'fuel' ? '🪙' : '⚙️'})`;
                itemDiv.appendChild(info);

                const buyBtn = document.createElement('button');
                buyBtn.textContent = 'Buy';
                buyBtn.style.cssText = 'padding:8px 16px;background:#4CAF50;border:none;border-radius:6px;color:#FFF;cursor:pointer;font-weight:bold;';

                const canBuy = item.currency === 'fuel'
                    ? (game.fuelCoins >= item.cost && game.fuel < game.maxFuel)
                    : (game.gearCoins >= item.cost);

                if (!canBuy) {
                    buyBtn.disabled = true;
                    buyBtn.style.background = '#666';
                    buyBtn.style.cursor = 'not-allowed';
                }

                buyBtn.addEventListener('click', () => {
                    game._executeShopAction(item.id);
                    renderShop();
                    nav.updateHomeStats();
                });

                itemDiv.appendChild(buyBtn);
                shopItems.appendChild(itemDiv);
            });
        }

        // Shop buttons
        const shopBackBtn = document.getElementById('shop-back-btn');
        const shopRaceBtn = document.getElementById('shop-race-btn');

        shopBackBtn.addEventListener('click', () => {
            nav.switchPage('home');
        });

        shopRaceBtn.addEventListener('click', () => {
            if (game.fuel > 0) {
                game.continueToRace();
                nav.switchPage('race');
            } else {
                alert('Need fuel! Go to quiz to earn fuel coins.');
            }
        });

        // Keyboard handler
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && game.state === 'RACING') {
                game.exitRace();
                nav.switchPage('home');
            }
        });

        // Update shop when page changes
        window.updateShop = function() {
            const shopFuelCoins = document.getElementById('shop-fuel-coins');
            const shopGearCoins = document.getElementById('shop-gear-coins');
            const shopFuel = document.getElementById('shop-fuel');
            const shopNitro = document.getElementById('shop-nitro');

            if (shopFuelCoins) shopFuelCoins.textContent = game.fuelCoins;
            if (shopGearCoins) shopGearCoins.textContent = game.gearCoins;
            if (shopFuel) shopFuel.textContent = Math.round(game.fuel);
            if (shopNitro) shopNitro.textContent = game.nitroCharges;

            renderShop();
        };
    })();
    </script>
</body>
</html>
