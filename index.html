<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Racing - Back words, drive fast!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Top Navigation -->
    <nav id="top-nav">
        <button class="nav-btn active" data-page="home">Home</button>
        <button class="nav-btn" data-page="quiz">Quiz</button>
        <button class="nav-btn" data-page="shop">Shop</button>
        <button class="nav-btn" data-page="race">Race</button>
        <button class="nav-btn nav-btn-debug" id="debug-reset" title="Reset all progress (for testing)">⚙️</button>
    </nav>

    <!-- Page 1: Home -->
    <div id="page-home" class="page active">
        <div class="home-content">
            <h1>WORD RACING</h1>
            <p>Back words, drive fast!</p>
            <!-- Learning Panel (inserted by LearningUI) -->
            <div id="learning-panel-container"></div>
            <div id="home-stats">
                <div class="stat-item"><span class="text-muted">Coins</span> <span id="home-coins">0</span></div>
                <div class="stat-item"><span class="text-muted">Fuel</span> <span class="stat-value"><span id="home-fuel">0</span>/100</span></div>
                <div class="stat-item"><span class="text-muted">Nitro</span> <span id="home-nitro">0</span></div>
                <div class="stat-item"><span class="text-muted">Fuel Coins</span> <span id="home-fuel-coins">0</span></div>
                <div class="stat-item"><span class="text-muted">Gear Coins</span> <span id="home-gear-coins">0</span></div>
            </div>
            <div id="home-leaderboard">
                <!-- Leaderboard will be rendered here -->
            </div>
            <div id="home-lap-select">
                <!-- Lap count selector -->
            </div>
            <button id="home-start-btn">START QUIZ</button>
        </div>
    </div>

    <!-- Page 2: Quiz -->
    <div id="page-quiz" class="page">
        <div id="quiz-container">
            <!-- Quiz Type Selector -->
            <div id="quiz-type-selector">
                <button id="quiz-type-simple" class="quiz-type-btn active">Basic</button>
                <button id="quiz-type-complex" class="quiz-type-btn">Advanced</button>
            </div>

            <!-- Quiz Layout: Question + Learning Panel Side by Side -->
            <div id="quiz-layout">
                <!-- Quiz Question -->
                <div id="quiz-question-area">
                    <div id="quiz-progress"></div>
                    <div id="quiz-word"></div>
                    <div id="quiz-meaning-en"></div>
                    <div id="quiz-sentence"></div>
                    <div id="quiz-options"></div>
                    <div id="quiz-nav">
                        <button id="quiz-prev-btn" class="quiz-nav-btn" disabled>◀ 上一题</button>
                        <button id="quiz-next-btn" class="quiz-nav-btn" disabled>下一题 ▶</button>
                    </div>
                    <div id="quiz-dont-know">
                        <button id="quiz-dont-know-btn">我不认识 😅</button>
                    </div>
                    <div id="quiz-nitro-hint">Correct answer = Nitro boost!</div>
                </div>

                <!-- Learning Panel (shown when "I don't know" or wrong answer) -->
                <div id="quiz-learn-panel" style="display:none;">
                    <div id="quiz-learn-word"></div>
                    <div id="quiz-learn-phonetic"></div>
                    <div id="quiz-learn-meaning"></div>
                    <div id="quiz-learn-sentence"></div>
                    <div id="quiz-learn-sentence-cn"></div>
                    <button id="quiz-learn-continue-btn">我记住了，继续！</button>
                </div>
            </div>

            <!-- Quiz Complete -->
            <div id="quiz-complete">
                <h3>Pit Stop Complete!</h3>
                <div class="result-text" id="quiz-result-accuracy"></div>
                <div class="result-text" id="quiz-result-fuel"></div>
                <div class="result-text" id="quiz-result-gear"></div>
                <div class="result-text" id="quiz-result-combo"></div>
                <div class="result-text" id="quiz-result-wrong"></div>
                <div class="nitro-text" id="quiz-result-nitro"></div>
                <!-- Lap count selector -->
                <div id="quiz-lap-select"></div>
                <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;">
                    <button id="quiz-restart-btn">RETRY QUIZ</button>
                    <button id="quiz-start-btn">START RACE</button>
                    <button id="quiz-shop-btn">GO TO SHOP</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Page 3: Shop -->
    <div id="page-shop" class="page">
        <div id="shop-container">
            <h2>Pit Shop</h2>
            <div id="shop-stats">
                <div>Fuel Coins: <span id="shop-fuel-coins">0</span></div>
                <div>Gear Coins: <span id="shop-gear-coins">0</span></div>
                <div>Fuel: <span id="shop-fuel">0</span>/100</div>
                <div>Nitro: <span id="shop-nitro">0</span></div>
            </div>
            <div id="shop-items">
                <!-- Shop items will be rendered here -->
            </div>
            <div id="shop-actions">
                <button id="shop-back-btn">BACK</button>
                <button id="shop-race-btn">START RACE</button>
            </div>
        </div>
    </div>

    <!-- Page 4: Race -->
    <div id="page-race" class="page">
        <canvas id="gameCanvas"></canvas>
        <div id="touch-controls">
            <div class="touch-btn-group">
                <button class="touch-btn" data-action="left">&#9664;</button>
                <button class="touch-btn" data-action="down">&#9660;</button>
            </div>
            <div class="touch-btn-group">
                <button class="touch-btn" data-action="up">&#9650;</button>
                <button class="touch-btn" data-action="right">&#9654;</button>
                <button class="touch-btn touch-btn-nitro" data-action="nitro">N2O</button>
            </div>
        </div>
    </div>

    <!-- Scripts (ES6 Module) -->
    <script type="module" src="js/main-v2.js"></script>
</body>
</html>
